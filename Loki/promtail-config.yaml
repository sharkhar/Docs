server:
  http_listen_port: 9080
  grpc_listen_port: 0
 
positions:
  filename: /tmp/positions.yaml
 
clients:
  - url: http://localhost:3100/loki/api/v1/push
 
scrape_configs:
- job_name: rta-dev
  static_configs:
  - targets:
      - localhost
    labels:
      job: messageslog
      host: localhost
      _path_: /var/log/messages*
      stream: stdout
 
  - targets:
      - localhost
    labels:
      job: login-logs
      host: localhost
      _path_: /mnt/logs/applogs/*
      stream: stdout
